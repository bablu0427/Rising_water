<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Rising Waters{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ url_for('home') }}" aria-label="Rising Waters home">
            <img src="{{ url_for('static', filename='img/flood-shield.svg') }}" alt="" class="brand-mark">
            <span>Rising Waters</span>
        </a>
        <nav class="nav-links" aria-label="Main navigation">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('predict') }}">Predict</a>
            <a href="{{ url_for('about') }}">About</a>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <span>Machine Learning Flood Prediction</span>
        <span>Python | Flask | IBM Cloud Ready</span>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
